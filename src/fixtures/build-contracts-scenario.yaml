boundary_assumptions:

  - id: "BA-1"
    type: contract
    statement: "All monetary amounts are expressed in the smallest currency unit (minor units / cents) as integers — never as decimal floats — to prevent floating point rounding errors across service boundaries"
    affects_events:
      - "TransactionAuthorized"
      - "TransactionSettled"
      - "TransactionDisputeOpened"
    confidence: CONFIRMED
    verify_with: "already confirmed in gateway API spec v2.1 — enforced at schema validation layer"

  - id: "BA-2"
    type: contract
    statement: "GatewayContractVersioned breaking_changes field governs consumer migration; consumers subscribed to contract-registry-bus must handle both old and new schemas until deprecation_date passes"
    affects_events:
      - "GatewayContractVersioned"
      - "TransactionAuthorized"
      - "TransactionSettled"
    confidence: LIKELY
    verify_with: "platform team — confirm whether consumers can declare supported contract versions or must handle all versions"

  - id: "BA-3"
    type: ownership
    statement: "The Gateway aggregate owns the contract registry; individual Transaction events do not carry full contract metadata — consumers must look up contract version from Gateway state to validate incoming payloads"
    affects_events:
      - "GatewayContractVersioned"
      - "GatewayActivated"
      - "TransactionAuthorized"
      - "TransactionSettled"
    confidence: POSSIBLE
    verify_with: "architecture review — evaluate whether embedding contract_version in every Transaction event would reduce consumer coupling"
