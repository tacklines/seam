boundary_assumptions:

  - id: "BA-1"
    type: ordering
    statement: "DatabaseSchemaCreated must complete and be verified before ServiceDeployed is emitted; a service cannot start if its schema is not in place"
    affects_events:
      - "DatabaseSchemaCreated"
      - "ServiceDeployed"
      - "DataMigrated"
    confidence: CONFIRMED
    verify_with: "already confirmed in deployment runbook — pre-flight checks enforce this ordering"

  - id: "BA-2"
    type: ordering
    statement: "TrafficSwitched can only occur after DataMigrated completes with checksum_verified=true; partial data migrations must not receive live traffic"
    affects_events:
      - "DataMigrated"
      - "TrafficSwitched"
      - "MigrationRolledBack"
    confidence: CONFIRMED
    verify_with: "migration control bus — confirm that gate check is enforced by orchestrator, not by convention"

  - id: "BA-3"
    type: ownership
    statement: "The Migration aggregate owns the overall migration state machine; the Service and Database aggregates are supporting actors that emit their own events but do not control migration state transitions"
    affects_events:
      - "MigrationStarted"
      - "DataMigrated"
      - "TrafficSwitched"
      - "MonolithDecommissioned"
      - "MigrationRolledBack"
    confidence: LIKELY
    verify_with: "architecture review — clarify whether Migration is a process manager or a true aggregate"

  - id: "BA-4"
    type: contract
    statement: "ServiceHealthDegraded carries metric_name and threshold_value as strings rather than typed enums; consumers must handle unknown metric names gracefully"
    affects_events:
      - "ServiceHealthDegraded"
      - "MigrationRolledBack"
    confidence: POSSIBLE
    verify_with: "platform team — determine if alerting-bus supports a typed metric schema or accepts free-form strings"

  - id: "BA-5"
    type: existence
    statement: "MonolithDecommissioned is a terminal event with no undo path; a post-decommission issue must initiate a new ServiceDeployed cycle rather than reversing decommission"
    affects_events:
      - "MonolithDecommissioned"
      - "MigrationRolledBack"
    confidence: LIKELY
    verify_with: "tech lead and operations team — confirm that rollback window closes definitively at decommission"
