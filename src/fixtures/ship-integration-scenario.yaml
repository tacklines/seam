    state_change: "READY -> DEPLOYING"
    integration:
      direction: outbound
      channel: "deployment-events"
    confidence: CONFIRMED

  - name: "DeploymentCompleted"
    aggregate: "Environment"
    trigger: "All pods reach Running state and readiness probes pass"
    payload:
      - field: "environment_id"
        type: "str"
      - field: "deployment_id"
        type: "str"
      - field: "pods_running"
        type: "int"
      - field: "deployment_duration_seconds"
        type: "int"
      - field: "rollout_strategy"
        type: "str"
    state_change: "DEPLOYING -> DEPLOYED"
    integration:
      direction: outbound
      channel: "deployment-events"
    confidence: CONFIRMED

  - name: "HealthCheckPassed"
    aggregate: "HealthCheck"
    trigger: "Synthetic monitoring confirms all critical endpoints respond within SLA thresholds"
    payload:
      - field: "environment_id"
        type: "str"
      - field: "check_id"
