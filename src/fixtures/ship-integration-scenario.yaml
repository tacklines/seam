      - field: "target_environment"
        type: "str"
    state_change: "(new) -> RUNNING"
    integration:
      direction: inbound
      channel: "vcs-webhook"
    sources:
      - ".github/workflows/release.yml:12-25"
    confidence: CONFIRMED

  - name: "BuildCompleted"
    aggregate: "Pipeline"
    trigger: "Docker image build step finishes and image is pushed to registry"
    payload:
