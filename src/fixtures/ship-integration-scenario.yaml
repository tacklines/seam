      channel: "observability-events"
    confidence: CONFIRMED

  - name: "HealthCheckFailed"
    aggregate: "HealthCheck"
    trigger: "Synthetic monitoring detects endpoint latency or error rate breach"
    payload:
      - field: "environment_id"
        type: "str"
      - field: "check_id"
        type: "str"
      - field: "failed_endpoints"
        type: "list[str]"
      - field: "failure_reason"
        type: "str"
      - field: "p99_latency_ms"
        type: "int"
      - field: "error_rate_percent"
        type: "int"
    state_change: "(new) -> FAILED"
    integration:
      direction: outbound
      channel: "alerting-bus"
    confidence: CONFIRMED
    notes: "Triggers automatic RollbackInitiated if canary window has not closed"

  - name: "RollbackInitiated"
    aggregate: "Environment"
    trigger: "Automated rollback triggered by HealthCheckFailed or manual operator decision"
    payload:
      - field: "environment_id"
        type: "str"
      - field: "deployment_id"
        type: "str"
      - field: "rollback_to_version"
        type: "str"
      - field: "rollback_reason"
