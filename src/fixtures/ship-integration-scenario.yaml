    integration:
      direction: outbound
      channel: "infra-events"
    confidence: CONFIRMED

  - name: "DeploymentStarted"
    aggregate: "Environment"
    trigger: "Helm upgrade initiated against the target Kubernetes cluster"
    payload:
      - field: "environment_id"
        type: "str"
      - field: "deployment_id"
