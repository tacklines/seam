      - field: "initiated_by"
        type: "str"
      - field: "max_rollback_duration_seconds"
        type: "int"
    state_change: "DEPLOYED -> ROLLING_BACK"
    integration:
      direction: outbound
      channel: "deployment-events"
    confidence: LIKELY
    notes: "max_rollback_duration_seconds enforces SLA on rollback completion time"

  - name: "CanaryPromoted"
    aggregate: "Environment"
    trigger: "Canary phase passes all health checks and traffic ramps to 100 percent"
    payload:
      - field: "environment_id"
        type: "str"
      - field: "deployment_id"
        type: "str"
      - field: "canary_duration_minutes"
        type: "int"
      - field: "final_traffic_percentage"
        type: "int"
      - field: "promoted_at"
        type: "str"
    state_change: "DEPLOYED -> STABLE"
    integration:
      direction: outbound
      channel: "deployment-events"
    confidence: LIKELY
    notes: "Only emitted when canary_percentage < 100 at DeploymentStarted; skipped for full rollouts"

boundary_assumptions:

  - id: "BA-1"
    type: ordering
    statement: "TestsPassed must always precede ArtifactPublished; artifacts from builds with test failures must never reach the release registry"
    affects_events:
      - "TestsPassed"
      - "ArtifactPublished"
      - "DeploymentStarted"
    confidence: CONFIRMED
    verify_with: "already enforced by pipeline gate — confirmed in release.yml job dependency graph"

  - id: "BA-2"
    type: contract
    statement: "HealthCheckFailed with error_rate_percent above the configured SLA threshold (default: 1%) automatically triggers RollbackInitiated within 60 seconds during the canary window; after canary promotion rollback is manual-only"
    affects_events:
      - "HealthCheckFailed"
      - "RollbackInitiated"
      - "CanaryPromoted"
    confidence: LIKELY
    verify_with: "platform SRE team — confirm automatic rollback trigger threshold and whether it applies post-canary-promotion"

  - id: "BA-3"
    type: existence
    statement: "EnvironmentProvisioned is idempotent; re-running Terraform on an already-provisioned environment emits a second EnvironmentProvisioned only if resources changed, otherwise no event is emitted"
    affects_events:
      - "EnvironmentProvisioned"
      - "DeploymentStarted"
    confidence: POSSIBLE
    verify_with: "infrastructure team — clarify Terraform idempotency semantics and whether a no-op apply suppresses the event"

  - id: "BA-4"
    type: contract
    statement: "Canary percentage in DeploymentStarted must be between 5 and 50; values below 5 percent produce insufficient signal for health checks and values above 50 percent defeat the purpose of canary validation"
    affects_events:
      - "DeploymentStarted"
      - "CanaryPromoted"
      - "RollbackInitiated"
    confidence: POSSIBLE
    verify_with: "SRE team and product team — agree on canary percentage range policy and document in deployment runbook"
