      - field: "test_duration_seconds"
        type: "int"
    state_change: "BUILD_COMPLETE -> TESTS_PASSED"
    integration:
      direction: internal
    sources:
      - ".github/workflows/release.yml:58-92"
    confidence: CONFIRMED

  - name: "ArtifactPublished"
    aggregate: "Pipeline"
    trigger: "Versioned release artifacts (binaries, helm charts, SBOMs) published to release store"
    payload:
