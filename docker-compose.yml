services:
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import

  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: seam
      POSTGRES_USER: seam
      POSTGRES_PASSWORD: seam
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seam"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
