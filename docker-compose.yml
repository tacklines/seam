services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: seam
      POSTGRES_USER: seam
      POSTGRES_PASSWORD: seam
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seam"]
      interval: 5s
      timeout: 5s
      retries: 5

  hydra-migrate:
    image: oryd/hydra:v2.3
    depends_on:
      postgres:
        condition: service_healthy
    command: migrate sql --yes postgres://seam:seam@postgres:5432/hydra?sslmode=disable
    restart: on-failure

  hydra:
    image: oryd/hydra:v2.3
    depends_on:
      hydra-migrate:
        condition: service_completed_successfully
    ports:
      - "${HYDRA_PUBLIC_PORT:-4444}:4444"
      - "${HYDRA_ADMIN_PORT:-4445}:4445"
    command: serve all --dev --config /etc/config/hydra/hydra.yml
    volumes:
      - ./infra/ory/hydra.yml:/etc/config/hydra/hydra.yml:ro
    environment:
      DSN: postgres://seam:seam@postgres:5432/hydra?sslmode=disable

  kratos-migrate:
    image: oryd/kratos:v1.3
    depends_on:
      postgres:
        condition: service_healthy
    command: migrate sql --yes postgres://seam:seam@postgres:5432/kratos?sslmode=disable
    restart: on-failure

  kratos:
    image: oryd/kratos:v1.3
    depends_on:
      kratos-migrate:
        condition: service_completed_successfully
    ports:
      - "${KRATOS_PUBLIC_PORT:-4433}:4433"
      - "${KRATOS_ADMIN_PORT:-4434}:4434"
    command: serve all --dev --config /etc/config/kratos/kratos.yml --watch-courier
    volumes:
      - ./infra/ory/kratos.yml:/etc/config/kratos/kratos.yml:ro
      - ./infra/ory/identity.schema.json:/etc/config/kratos/identity.schema.json:ro
    environment:
      DSN: postgres://seam:seam@postgres:5432/kratos?sslmode=disable

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: seam
      RABBITMQ_DEFAULT_PASS: seam
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  coder:
    image: ghcr.io/coder/coder:latest
    profiles: [coder]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      CODER_PG_CONNECTION_URL: "postgresql://seam:seam@postgres:5432/coder?sslmode=disable"
      CODER_HTTP_ADDRESS: "0.0.0.0:7080"
      CODER_ACCESS_URL: "http://localhost:7080"
      CODER_TELEMETRY: "false"
      CODER_EXPERIMENTS: "*"
    ports:
      - "7080:7080"
    group_add:
      - "${DOCKER_GROUP_ID:-984}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  pgdata:
  rabbitmq_data:
