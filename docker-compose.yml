services:
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    command: start-dev --import-realm
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    ports:
      - "${KEYCLOAK_PORT:-8080}:8080"
    volumes:
      - ./infra/keycloak:/opt/keycloak/data/import

  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: seam
      POSTGRES_USER: seam
      POSTGRES_PASSWORD: seam
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seam"]
      interval: 5s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MGMT_PORT:-15672}:15672"
    environment:
      RABBITMQ_DEFAULT_USER: seam
      RABBITMQ_DEFAULT_PASS: seam
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "check_running"]
      interval: 10s
      timeout: 5s
      retries: 5

  coder:
    image: ghcr.io/coder/coder:latest
    profiles: [coder]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      CODER_PG_CONNECTION_URL: "postgresql://seam:seam@postgres:5432/coder?sslmode=disable"
      CODER_HTTP_ADDRESS: "0.0.0.0:7080"
      CODER_ACCESS_URL: "http://localhost:7080"
      CODER_TELEMETRY: "false"
      CODER_EXPERIMENTS: "*"
    ports:
      - "7080:7080"
    group_add:
      - "${DOCKER_GROUP_ID:-984}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock

volumes:
  pgdata:
  rabbitmq_data:
