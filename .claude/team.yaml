team: multi-human-workflows
description: "Web app for visualizing storm-prep YAML files from multi-human Event Storming workflows. Lit + Vite + Tailwind CSS v4 + D3 + Shoelace."

defaults:
  model: sonnet
  budget: 0.50
  permission-mode: dontAsk

practices:
  test-first: |
    When a task has clear acceptance criteria, a formal spec, or a reproducible bug,
    use /test-strategy before writing implementation code. This classifies the knowledge
    source (codified/articulated/tacit) and determines the right testing approach (TDD
    test-first, or test-after for exploratory work). Skip only for trivial changes
    (config tweaks, typo fixes, purely additive docs).

members:
  - name: architect
    role: "System design, schema contracts, state management patterns"
    tools: [Read, Write, Edit, Glob, Grep, Bash]
    owns:
      - "src/schema/**"
      - "src/state/**"
      - "docs/**"
      - "CLAUDE.md"

  - name: component
    role: "Lit web components, Shoelace integration, visual rendering, Playwright visual verification"
    tools: [Read, Write, Edit, Glob, Grep, Bash]
    mcp: [playwright]
    owns:
      - "src/components/**"
      - "index.html"
      - "src/styles.css"

  - name: logic
    role: "Pure library functions, YAML parsing, comparison algorithms, D3 layout"
    tools: [Read, Write, Edit, Glob, Grep, Bash]
    owns:
      - "src/lib/**"
      - "src/fixtures/**"

  - name: tester
    role: "Test strategy, coverage, edge cases, type-checking, Playwright e2e tests"
    tools: [Read, Write, Edit, Glob, Grep, Bash]
    mcp: [playwright]
    owns:
      - "src/lib/*.test.ts"
      - "vitest.config.ts"
      - "tsconfig.json"
      - "e2e/**"
      - "playwright.config.ts"
