version: v2.3.0

dsn: postgres://seam:seam@postgres:5432/hydra?sslmode=disable

serve:
  public:
    cors:
      enabled: true
      allowed_origins:
        - http://localhost:5173
      allowed_methods:
        - POST
        - GET
        - PUT
        - PATCH
        - DELETE
      allowed_headers:
        - Authorization
        - Content-Type
      exposed_headers:
        - Content-Type
  admin:
    host: 0.0.0.0
    port: 4445

urls:
  self:
    issuer: http://localhost:4444
  consent: http://localhost:5173/auth/consent
  login: http://localhost:5173/auth/login
  logout: http://localhost:5173/auth/logout

oidc:
  subject_identifiers:
    supported_types:
      - public
  dynamic_client_registration:
    enabled: true

secrets:
  system:
    - PLEASE-CHANGE-ME-I-AM-VERY-INSECURE

log:
  level: info
  format: json

strategies:
  access_token: jwt

oauth2:
  expose_internal_errors: true
  grant:
    jwt:
      jti_optional: true
