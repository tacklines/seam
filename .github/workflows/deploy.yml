name: Build & Deploy

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "agents/docs/**"
      - ".claude/**"
      - "**.md"
      - "!server/**"
      - "!frontend/**"

concurrency:
  group: deploy-main
  cancel-in-progress: true

permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  check:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        run: cd frontend && npm ci

      - name: TypeScript check
        run: cd frontend && npx tsc --noEmit

  build:
    runs-on: ubuntu-24.04-arm
    outputs:
      image: ${{ steps.meta.outputs.image }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        run: echo "image=${{ steps.ecr.outputs.registry }}/seam/server" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: server/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.image }}:latest
            ${{ steps.meta.outputs.image }}:sha-${{ github.sha }}
          build-args: |
            VITE_AUTH_AUTHORITY=https://auth.seam.tacklines.com
            VITE_APP_URL=https://seam.tacklines.com
            VITE_CLIENT_ID=seam-web
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [check, build]
    runs-on: ubuntu-24.04-arm
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy via SSM
        run: |
          INSTANCE_ID=${{ secrets.EC2_INSTANCE_ID }}
          ECR_URL="${{ needs.build.outputs.image }}"

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "commands=[
              'ECR_REGISTRY=$(echo $ECR_URL | cut -d/ -f1)',
              'aws ecr get-login-password --region ${{ env.AWS_REGION }} | docker login --username AWS --password-stdin \$ECR_REGISTRY',
              'docker pull ${ECR_URL}:latest',
              'docker create --name seam-extract ${ECR_URL}:latest true 2>/dev/null; docker cp seam-extract:/app/static/. /opt/seam/static/; docker rm seam-extract; chown -R caddy:caddy /opt/seam/static',
              'cd /opt/seam/repo && git pull --ff-only',
              'sed -i \"s|^SEAM_IMAGE=.*|SEAM_IMAGE=${ECR_URL}:latest|\" /opt/seam/.env',
              'cp /opt/seam/.env .env',
              '/usr/local/bin/docker-compose -f docker-compose.prod.yml up -d --no-deps seam-server seam-worker'
            ]" \
            --query "Command.CommandId" \
            --output text)

          echo "SSM Command: $COMMAND_ID"

          # Wait for completion
          for i in $(seq 1 30); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --query "Status" \
              --output text 2>/dev/null || echo "Pending")

            if [ "$STATUS" = "Success" ]; then
              echo "Deploy succeeded"
              exit 0
            elif [ "$STATUS" = "Failed" ] || [ "$STATUS" = "Cancelled" ]; then
              echo "Deploy failed with status: $STATUS"
              aws ssm get-command-invocation \
                --command-id "$COMMAND_ID" \
                --instance-id "$INSTANCE_ID" \
                --query "StandardErrorContent" \
                --output text
              exit 1
            fi

            sleep 10
          done

          echo "Deploy timed out"
          exit 1
