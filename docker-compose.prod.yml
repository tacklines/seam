services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seam"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "127.0.0.1:15672:15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q check_running"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - internal

  hydra-migrate:
    image: oryd/hydra:v2.3
    command: migrate -c /etc/config/hydra/hydra.yml sql -e --yes
    volumes:
      - ./infra/ory/hydra-prod.yml:/etc/config/hydra/hydra.yml:ro
    environment:
      DSN: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/hydra?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    restart: "no"

  hydra:
    image: oryd/hydra:v2.3
    command: serve all --config /etc/config/hydra/hydra.yml --dangerous-force-http
    volumes:
      - ./infra/ory/hydra-prod.yml:/etc/config/hydra/hydra.yml:ro
    depends_on:
      hydra-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:4444:4444"
      - "127.0.0.1:4445:4445"
    environment:
      DSN: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/hydra?sslmode=disable
      SECRETS_SYSTEM: ${HYDRA_SECRETS_SYSTEM}
    networks:
      - internal

  kratos-migrate:
    image: oryd/kratos:v1.3
    command: migrate sql -e --yes --config /etc/config/kratos/kratos.yml
    volumes:
      - ./infra/ory/kratos-prod.yml:/etc/config/kratos/kratos.yml:ro
      - ./infra/ory/identity.schema.json:/etc/config/kratos/identity.schema.json:ro
    environment:
      DSN: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/kratos?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal
    restart: "no"

  kratos:
    image: oryd/kratos:v1.3
    command: serve --config /etc/config/kratos/kratos.yml --watch-courier
    volumes:
      - ./infra/ory/kratos-prod.yml:/etc/config/kratos/kratos.yml:ro
      - ./infra/ory/identity.schema.json:/etc/config/kratos/identity.schema.json:ro
    depends_on:
      kratos-migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
    ports:
      - "127.0.0.1:4433:4433"
    environment:
      DSN: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/kratos?sslmode=disable
      SECRETS_COOKIE: ${KRATOS_SECRETS_COOKIE}
      SECRETS_CIPHER: ${KRATOS_SECRETS_CIPHER}
    networks:
      - internal

  seam-server:
    image: ${SEAM_IMAGE}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "127.0.0.1:3002:3002"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/seam
      AMQP_URL: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
      RUST_LOG: info
      HOST: 0.0.0.0
      PORT: 3002
      CREDENTIAL_MASTER_KEY: ${CREDENTIAL_MASTER_KEY}
      JWKS_URL: https://auth.seam.tacklines.com/oauth/v2/keys
      ISSUER_URL: https://auth.seam.tacklines.com
      HYDRA_ADMIN_URL: http://hydra:4445
      CODER_URL: http://coder:7080
      CODER_TOKEN: ${CODER_TOKEN}
      MCP_AUTH_DISABLED: ${MCP_AUTH_DISABLED:-false}
      SEAM_URL: http://seam-server:3002
    networks:
      - internal

  seam-worker:
    image: ${SEAM_IMAGE}
    restart: unless-stopped
    command: ["seam-worker"]
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/seam
      AMQP_URL: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
      RUST_LOG: info
      WORKER_API_TOKEN: ${WORKER_API_TOKEN}
      SEAM_URL: http://seam-server:3002
    networks:
      - internal

  coder:
    image: ghcr.io/coder/coder:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      CODER_PG_CONNECTION_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/coder?sslmode=disable
      CODER_HTTP_ADDRESS: 0.0.0.0:7080
      CODER_ACCESS_URL: ${CODER_ACCESS_URL}
      CODER_TELEMETRY: "false"
      CODER_EXPERIMENTS: "*"
    ports:
      - "127.0.0.1:7080:7080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - ${DOCKER_GID}
    networks:
      - internal
      - default

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
  rabbitmq_data:
