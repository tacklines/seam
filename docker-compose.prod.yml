services:
  postgres:
    image: pgvector/pgvector:pg17
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      ZITADEL_DB_PASSWORD: ${ZITADEL_DATABASE_POSTGRES_USER_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seam"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  rabbitmq:
    image: rabbitmq:3-management
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "127.0.0.1:15672:15672"
    healthcheck:
      test: ["CMD-SHELL", "rabbitmq-diagnostics -q check_running"]
      interval: 10s
      timeout: 10s
      retries: 5
    networks:
      - internal

  zitadel:
    image: ghcr.io/zitadel/zitadel:latest
    restart: unless-stopped
    user: "0"
    depends_on:
      postgres:
        condition: service_healthy
    command: start-from-init --masterkeyFromEnv --tlsMode external
    ports:
      - "127.0.0.1:8080:8080"
    environment:
      ZITADEL_MASTERKEY: ${ZITADEL_MASTERKEY}
      ZITADEL_PORT: 8080
      ZITADEL_TLS_ENABLED: "false"
      ZITADEL_DATABASE_POSTGRES_HOST: postgres
      ZITADEL_DATABASE_POSTGRES_PORT: 5432
      ZITADEL_DATABASE_POSTGRES_DATABASE: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_USERNAME: zitadel
      ZITADEL_DATABASE_POSTGRES_USER_PASSWORD: ${ZITADEL_DATABASE_POSTGRES_USER_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_USER_SSL_MODE: disable
      ZITADEL_DATABASE_POSTGRES_ADMIN_USERNAME: ${POSTGRES_USER}
      ZITADEL_DATABASE_POSTGRES_ADMIN_PASSWORD: ${POSTGRES_PASSWORD}
      ZITADEL_DATABASE_POSTGRES_ADMIN_SSL_MODE: disable
      ZITADEL_EXTERNALDOMAIN: auth.seam.tacklines.com
      ZITADEL_EXTERNALPORT: 443
      ZITADEL_EXTERNALSECURE: "true"
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_USERNAME: admin
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORD: ${ZITADEL_ADMIN_PASSWORD}
      ZITADEL_FIRSTINSTANCE_ORG_HUMAN_PASSWORDCHANGEREQUIRED: false
      # Login V2: machine user + PAT for the login client
      ZITADEL_FIRSTINSTANCE_LOGINCLIENTPATPATH: /zitadel/bootstrap/login-client.pat
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_USERNAME: login-client
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_MACHINE_NAME: Automatically Initialized IAM_LOGIN_CLIENT
      ZITADEL_FIRSTINSTANCE_ORG_LOGINCLIENT_PAT_EXPIRATIONDATE: "2036-01-01T00:00:00Z"
      # Login V2 feature + redirect URLs
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_REQUIRED: "true"
      ZITADEL_DEFAULTINSTANCE_FEATURES_LOGINV2_BASEURI: https://auth.seam.tacklines.com/ui/v2/login/
      ZITADEL_OIDC_DEFAULTLOGINURLV2: https://auth.seam.tacklines.com/ui/v2/login/login?authRequest=
      ZITADEL_OIDC_DEFAULTLOGOUTURLV2: https://auth.seam.tacklines.com/ui/v2/login/logout?post_logout_redirect=
      ZITADEL_SAML_DEFAULTLOGINURLV2: https://auth.seam.tacklines.com/ui/v2/login/login?samlRequest=
    volumes:
      - zitadel_bootstrap:/zitadel/bootstrap:rw
    networks:
      - internal

  zitadel-login:
    image: ghcr.io/zitadel/zitadel-login:latest
    restart: unless-stopped
    user: "0"
    depends_on:
      - zitadel
    environment:
      ZITADEL_API_URL: http://zitadel:8080
      NEXT_PUBLIC_BASE_PATH: /ui/v2/login
      ZITADEL_SERVICE_USER_TOKEN_FILE: /zitadel/bootstrap/login-client.pat
      CUSTOM_REQUEST_HEADERS: "Host:auth.seam.tacklines.com,X-Forwarded-Proto:https"
    healthcheck:
      test: ["CMD", "/bin/sh", "-c", "node /app/healthcheck.js http://localhost:3000/ui/v2/login/healthy"]
      interval: 10s
      timeout: 30s
      retries: 12
      start_period: 20s
    volumes:
      - zitadel_bootstrap:/zitadel/bootstrap:ro
    ports:
      - "127.0.0.1:3100:3000"
    networks:
      - internal

  seam-server:
    image: ${SEAM_IMAGE}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "127.0.0.1:3002:3002"
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/seam
      AMQP_URL: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
      RUST_LOG: info
      HOST: 0.0.0.0
      PORT: 3002
      CREDENTIAL_MASTER_KEY: ${CREDENTIAL_MASTER_KEY}
      JWKS_URL: https://auth.seam.tacklines.com/oauth/v2/keys
      ISSUER_URL: https://auth.seam.tacklines.com
      CODER_URL: http://coder:7080
      CODER_TOKEN: ${CODER_TOKEN}
      MCP_AUTH_DISABLED: ${MCP_AUTH_DISABLED:-false}
      SEAM_URL: http://seam-server:3002
    networks:
      - internal

  seam-worker:
    image: ${SEAM_IMAGE}
    restart: unless-stopped
    command: ["seam-worker"]
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/seam
      AMQP_URL: amqp://${RABBITMQ_DEFAULT_USER}:${RABBITMQ_DEFAULT_PASS}@rabbitmq:5672
      RUST_LOG: info
      WORKER_API_TOKEN: ${WORKER_API_TOKEN}
      SEAM_URL: http://seam-server:3002
    networks:
      - internal

  coder:
    image: ghcr.io/coder/coder:latest
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      CODER_PG_CONNECTION_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/coder?sslmode=disable
      CODER_HTTP_ADDRESS: 0.0.0.0:7080
      CODER_ACCESS_URL: ${CODER_ACCESS_URL}
      CODER_TELEMETRY: "false"
      CODER_EXPERIMENTS: "*"
    ports:
      - "127.0.0.1:7080:7080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    group_add:
      - ${DOCKER_GID}
    networks:
      - internal
      - default

networks:
  internal:
    driver: bridge

volumes:
  pgdata:
  rabbitmq_data:
  zitadel_bootstrap:
